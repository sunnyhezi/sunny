<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunny Chao | 專業個人檔案</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --linkedin-blue: #0a66c2;
            --linkedin-dark-blue: #004182;
            --bg-gray: #f3f2ef;
            --text-main: rgba(0, 0, 0, 0.9);
            --text-sub: rgba(0, 0, 0, 0.6);
            --border-color: rgba(0, 0, 0, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans TC', -apple-system, system-ui, sans-serif;
            background-color: var(--bg-gray);
            color: var(--text-main);
            line-height: 1.5;
            padding-bottom: 50px;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 10px;
        }

        .card {
            background: #fff;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 12px;
            overflow: hidden;
            position: relative;
        }

        .card-content {
            padding: 24px;
        }

        .header-banner {
            height: 160px;
            background: linear-gradient(to right, #a0b4b7, #dbe7e9);
        }

        .profile-pic-container {
            padding: 0 24px;
            margin-top: -100px;
        }

        .profile-pic {
            width: 152px;
            height: 152px;
            border-radius: 50%;
            border: 4px solid #fff;
            background: #eee;
            object-fit: cover;
        }

        .intro-section h1 {
            font-size: 24px;
            margin-top: 12px;
        }

        .headline {
            font-size: 16px;
            color: var(--text-main);
            margin: 4px 0;
        }

        .location {
            font-size: 14px;
            color: var(--text-sub);
            margin-bottom: 12px;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .btn {
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: 0.2s;
            display: inline-block;
        }

        .btn-primary {
            background-color: var(--linkedin-blue);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background-color: var(--linkedin-dark-blue);
        }

        .btn-outline {
            background-color: transparent;
            color: var(--linkedin-blue);
            border: 1px solid var(--linkedin-blue);
        }

        .btn-outline:hover {
            background-color: rgba(10, 102, 194, 0.1);
        }

        h2 {
            font-size: 20px;
            margin-bottom: 12px;
        }

        .exp-item {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .exp-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .company-logo {
            width: 48px;
            height: 48px;
            background: #eee;
            border-radius: 4px;
        }

        .exp-info h3 {
            font-size: 16px;
        }

        .exp-info .subtitle {
            font-size: 14px;
            color: var(--text-main);
        }

        .exp-info .date-loc {
            font-size: 14px;
            color: var(--text-sub);
        }

        .skills-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .skill-item {
            font-weight: 600;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        @media (max-width: 600px) {
            .header-banner { height: 100px; }
            .profile-pic { width: 120px; height: 120px; }
            .profile-pic-container { margin-top: -60px; }
        }
    </style>
</head>
<body>
